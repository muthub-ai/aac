pattern:
  id: data-platform-bq
  version: "1.4.0"
  name: "Enterprise Data Warehouse with BigQuery"
  description: >-
    Fully managed, serverless enterprise data warehouse architecture
    using BigQuery, decoupled storage/compute, and integrated ML
    capabilities.

  category: database
  exposure: internal

  metadata:
    owner_team: Data Engineering
    approved_date: "2024-06-20"
    tags:
      - Analytics
      - Serverless
      - BigQuery
      - Data Warehouse

  components:
    - componentId: source-systems
      name: Source Systems
      type: external
      description: Upstream operational databases and SaaS applications
      technology: Various (PostgreSQL, MySQL, Salesforce, SAP)

    - componentId: pubsub-ingestion
      name: Cloud Pub/Sub
      type: messaging
      description: Real-time event streaming ingestion layer
      technology: Cloud Pub/Sub
      properties:
        throughput: "100K msgs/sec"

    - componentId: gcs-data-lake
      name: Cloud Storage Data Lake
      type: storage
      description: Raw and staged data landing zone in GCS buckets
      technology: Cloud Storage
      properties:
        storage_class: Standard
        lifecycle_policy: "30d → Nearline → 90d → Coldline"

    - componentId: dataflow-etl
      name: Cloud Dataflow
      type: compute
      description: Managed Apache Beam pipelines for ETL/ELT processing
      technology: Cloud Dataflow
      properties:
        autoscaling: true
        max_workers: 50

    - componentId: bigquery-warehouse
      name: BigQuery Data Warehouse
      type: database
      description: Partitioned and clustered analytical datasets
      technology: BigQuery
      properties:
        partitioning: ingestion_time
        clustering: [customer_id, region]
        pricing_model: capacity

    - componentId: bigquery-ml
      name: BigQuery ML
      type: ai-ml
      description: In-warehouse machine learning model training
      technology: BigQuery ML

    - componentId: looker-bi
      name: Looker
      type: application
      description: Business intelligence dashboards and exploration
      technology: Looker

    - componentId: iam-security
      name: IAM Column-level Security
      type: security
      description: Fine-grained access control on sensitive columns
      technology: Cloud IAM + BigQuery Policy Tags

  validation:
    rules:
      - id: require-core-data-components
        type: required_components
        componentIds:
          - bigquery-warehouse
          - iam-security
      - id: enforce-partitioning
        type: resource_policy
        selector:
          componentKinds: ["database"]
        allowedResourceTypes: ["database"]
        message: BigQuery datasets must use time-based partitioning

  resiliency_patterns:
    - name: active-passive
      description: "Active-passive deployment with RPO < 1h and RTO < 15min"
      regions:
        active: [us-central1]
        passive: [us-east1]
        datacenters_per_region: 1

  advantages:
    - Petabyte-scale analytics without infrastructure management
    - Built-in BigQuery ML for predictive analytics
    - Seamless integration with Cloud Storage and Dataflow

  considerations:
    - Query cost predictability (on-demand vs. capacity pricing)
    - Requires strict partitioning/clustering for performance
    - Data residency compliance

  gettingStarted:
    - step: 1
      title: Set up a secure data ingestion pipeline via Cloud Pub/Sub or Cloud Storage.
    - step: 2
      title: Transform data using ETL/ELT processes via Cloud Dataflow or dbt.
    - step: 3
      title: Load processed data into partitioned and clustered BigQuery datasets.
    - step: 4
      title: Implement IAM column-level security and expose data to BI tools like Looker.
