pattern:
  id: internal-api-multiregional
  version: "2.1.0"
  name: "Internal API Pattern — Multi-regional VMs"
  description: >-
    Multi-regional deployment of internal APIs using Compute Engine
    Managed Instance Groups (MIGs) and Internal HTTP(S) Load Balancing
    for high availability and low latency.

  category: compute
  exposure: internal

  metadata:
    owner_team: Platform Infrastructure
    approved_date: "2024-09-15"
    tags:
      - Private Cloud
      - Compute Engine
      - Load Balancing
      - High Availability

  components:
    - id: vpc-network
      name: Global VPC Network
      type: network
      description: Shared VPC spanning multiple regions with custom subnets
      technology: Cloud VPC

    - id: subnet-region-a
      name: Regional Subnet A
      type: network
      description: Private subnet in primary region (e.g., us-central1)
      technology: Cloud VPC Subnet
      properties:
        cidr: "10.0.1.0/24"
        region: us-central1

    - id: subnet-region-b
      name: Regional Subnet B
      type: network
      description: Private subnet in secondary region (e.g., us-east1)
      technology: Cloud VPC Subnet
      properties:
        cidr: "10.0.2.0/24"
        region: us-east1

    - id: mig-region-a
      name: MIG Region A
      type: compute
      description: Regional Managed Instance Group running API service
      technology: Compute Engine MIG
      properties:
        min_replicas: 2
        max_replicas: 10
        machine_type: e2-standard-4

    - id: mig-region-b
      name: MIG Region B
      type: compute
      description: Regional Managed Instance Group running API service
      technology: Compute Engine MIG
      properties:
        min_replicas: 2
        max_replicas: 10
        machine_type: e2-standard-4

    - id: internal-lb
      name: Internal HTTP(S) Load Balancer
      type: networking
      description: Global internal Application Load Balancer with global access
      technology: Cloud Load Balancing

    - id: health-check
      name: Health Check
      type: monitoring
      description: HTTP health check for backend service instances
      technology: Cloud Health Check
      properties:
        protocol: HTTP
        port: 8080
        check_interval_sec: 10

    - id: autoscaler
      name: Autoscaler
      type: compute
      description: CPU-based autoscaling policy for MIGs
      technology: Compute Engine Autoscaler
      properties:
        target_cpu_utilization: 0.6

  validation:
    rules:
      - type: required_components
        components:
          - vpc-network
          - internal-lb
          - health-check
      - type: resource_policy
        resource: compute
        constraint: min_replicas >= 2
        message: Production workloads must have at least 2 replicas per region

  resiliency_patterns:
    type: active-active
    regions:
      primary: us-central1
      secondary: us-east1
    rpo: "0"
    rto: "< 30s"

  advantages:
    - High availability across regions
    - Localized low latency for internal clients
    - Resilience against regional outages

  considerations:
    - Increased infrastructure cost
    - Complexity in cross-region data replication
    - Requires global VPC routing

  gettingStarted:
    - step: 1
      title: Set up VPC network and subnets in at least two target regions.
    - step: 2
      title: Create Compute Engine instance templates and regional Managed Instance Groups (MIGs).
    - step: 3
      title: Configure a global internal HTTP(S) load balancer with global access enabled.
    - step: 4
      title: Set up backend services, health checks, and autoscaling policies.
