    author: Platform Engineering Team
    change: Initial waiver request submitted
  - date: "2024-11-28"
    author: Security Architecture Team
    change: Risk assessment completed, compensating controls validated
  - date: "2024-12-01"
    author: CISO
    change: Waiver approved with conditions
