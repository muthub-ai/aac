actors:
  Customer:
    type: Person
    label: Customer
    description: Customer using the app
    boundary: External
  DataScientist:
    type: Person
    label: Data Scientist
    description: Data scientist developing a machine learning model
    boundary: External

softwareSystems:
  MLPlatform:
    label: ML Platform
    description: Machine learning model serving platform exposing models over REST and Kafka
    boundary: Internal
    containers:
      Sidecar:
        label: Model Sidecar Application
        technology: Python
        description: Ambassador sidecar for ML model
        components:
          StreamingModule:
            label: Streaming Module
            technology: Python, Kafka
            description: Reads prediction requests from Kafka topic and returns predictions
          RestModule:
            label: REST Module
            technology: Python, FastAPI
            description: Receives prediction requests and returns response
      ModelContainer:
        label: Model
        technology: Python
        description: Machine learning model serving predictions
        components:
          ModelImplementation:
            label: Python Model Implementation
            technology: Python
            description: Model class implementing __init__ and predict methods
          ModelWrapper:
            label: Model Wrapper
            technology: Python
            description: Wrapper serving predictions via Dataframe interface

  LogAggregator:
    label: Log Aggregator
    description: Logging system based on ELK stack
    boundary: External

  MetricsCollector:
    label: Metrics Collector
    description: Reliability toolkit supporting web application monitoring
    boundary: External

  BackendAppA:
    label: Backend Application A
    description: Application that uses a REST machine learning model
    boundary: External

  BackendAppB:
    label: Backend Application B
    description: Application that uses a streaming machine learning model
    boundary: External

  FEApplication:
    label: FE Application
    description: Client frontend web application
    boundary: External

relationships:
  - from: Customer
    to: FEApplication
    label: Uses
  - from: DataScientist
    to: MLPlatform.ModelContainer
    label: Develops
  - from: FEApplication
    to: BackendAppA
    label: Requests information from
    protocol: HTTP
  - from: FEApplication
    to: BackendAppB
    label: Requests information from
    protocol: HTTP
  - from: BackendAppA
    to: MLPlatform.Sidecar
    label: Requests prediction from
    protocol: HTTP
  - from: BackendAppB
    to: MLPlatform.Sidecar
    label: Sends prediction request
    protocol: Kafka
  - from: MLPlatform.Sidecar
    to: MLPlatform.ModelContainer
    label: Sends request to
    protocol: gRPC
  - from: MLPlatform.Sidecar
    to: LogAggregator
    label: Sends logs to
    protocol: Kafka
  - from: MLPlatform.ModelContainer
    to: LogAggregator
    label: Sends logs to
    protocol: Filebeat
  - from: MLPlatform.Sidecar
    to: MetricsCollector
    label: Exposes metrics to
    protocol: HTTP
