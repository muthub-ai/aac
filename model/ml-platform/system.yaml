name: ML Platform
description: Machine learning model serving platform architecture on Google Cloud Platform
model:
  people:
  - id: Customer
    name: Customer
    description: Customer using the app
    relationships:
    - destinationId: FEApplication
      description: Uses
  - id: DataScientist
    name: Data Scientist
    description: Data scientist developing a machine learning model
    relationships:
    - destinationId: MLPlatform.ModelContainer
      description: Develops
  softwareSystems:
  - id: MLPlatform
    name: ML Platform
    description: Machine learning model serving platform exposing models over REST and Cloud Pub/Sub
    group: ML Services
    tags: ml, platform, gcp
    disposition: Tolerate
    dataClassification: Confidential
    containers:
    - id: Sidecar
      name: Model Sidecar Application
      technology: Python
      description: Ambassador sidecar for ML model; includes Streaming Module (Cloud Pub/Sub consumer) and REST Module (FastAPI
        endpoint)
      tags: sidecar, python, fastapi
      properties:
        type: API
        softwreType: custom
        primaryLanguage: Python
        hostingPlatform: GKE
        operatingSystem: Linux
        deploymentType: active-active
        dataClassification: Confidential
      relationships:
      - destinationId: MLPlatform.ModelContainer
        description: Sends request to
        technology: gRPC
      - destinationId: LogAggregator
        description: Sends logs to
        technology: Cloud Pub/Sub
      - destinationId: MetricsCollector
        description: Exposes metrics to
        technology: HTTP
    - id: ModelContainer
      name: Model
      technology: Python
      description: Machine learning model serving predictions; includes Python Model Implementation (model class with __init__
        and predict methods) and Model Wrapper (serving predictions via Dataframe interface)
      tags: model, python
      properties:
        type: API
        softwreType: custom
        primaryLanguage: Python
        hostingPlatform: GKE
        operatingSystem: Linux
        deploymentType: active-active
        dataClassification: Confidential
      relationships:
      - destinationId: LogAggregator
        description: Sends logs to
        technology: Cloud Logging agent
  - id: LogAggregator
    name: Log Aggregator
    description: Centralized logging system based on Google Cloud Logging
    group: Observability
    tags: logging, gcp, cloud-logging
    disposition: Tolerate
    dataClassification: Internal Use
  - id: MetricsCollector
    name: Metrics Collector
    description: Application monitoring and reliability toolkit based on Google Cloud Monitoring
    group: Observability
    tags: monitoring, gcp, cloud-monitoring
    disposition: Tolerate
    dataClassification: Internal Use
  - id: BackendAppA
    name: Backend Application A
    description: Application that uses a REST machine learning model
    group: Backend Services
    tags: backend, rest
    disposition: Tolerate
    dataClassification: Confidential
    relationships:
    - destinationId: MLPlatform.Sidecar
      description: Requests prediction from
      technology: HTTP
  - id: BackendAppB
    name: Backend Application B
    description: Application that uses a streaming machine learning model
    group: Backend Services
    tags: backend, streaming
    disposition: Tolerate
    dataClassification: Confidential
    relationships:
    - destinationId: MLPlatform.Sidecar
      description: Sends prediction request
      technology: Cloud Pub/Sub
  - id: FEApplication
    name: FE Application
    description: Client frontend web application
    group: Frontend
    tags: frontend, web
    disposition: Tolerate
    dataClassification: Public
    relationships:
    - destinationId: BackendAppA
      description: Requests information from
      technology: HTTP
    - destinationId: BackendAppB
      description: Requests information from
      technology: HTTP
  deploymentNodes:
  - id: gcp-project
    name: GCP Project
    tags: gcp
    children:
    - id: us-central1
      name: us-central1
      tags: region
      containerInstances:
      - containerId: MLPlatform.Sidecar
        instanceId: 1
      - containerId: MLPlatform.ModelContainer
        instanceId: 2
views:
  systemContextViews:
  - key: MLPlatform-SystemContext
    softwareSystemId: MLPlatform
    description: System context view of the ML Platform showing all actors and external systems
  containerViews:
  - key: MLPlatform-Containers
    softwareSystemId: MLPlatform
    description: Container view of the ML Platform showing internal containers and external dependencies
  deploymentViews:
  - key: MLPlatform-Deployment-Prod
    softwareSystemId: MLPlatform
    environment: Production
    description: GCP deployment view of the ML Platform on Google Kubernetes Engine
