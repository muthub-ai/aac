actors:
  StockController:
    type: Person
    label: Stock Controller
    description: Responsible for stock levels of products in a category
    boundary: External
  DataScientist:
    type: Person
    label: Data Scientist
    description: Person involved in developing the machine learning model
    boundary: External

softwareSystems:
  DemandForecasting:
    label: Demand Forecasting
    description: ML model predicting monthly product demand
    boundary: Internal
    containers:
      ForecastStorage:
        label: Forecast Storage
        technology: Azure Cosmos DB
        description: OLTP database storing predicted demand per product per month
      ModelRegistry:
        label: Model Registry
        technology: MLFlow
        description: Storage for experiments, model artifacts, and metadata
      PredictionPipeline:
        label: Prediction Pipeline
        technology: PySpark
        description: Scheduled monthly pipeline predicting demand for all products
      ModelTraining:
        label: Model Training
        technology: Azure ML
        description: Pipeline that trains a new model based on input data
      PerformanceDashboard:
        label: Performance Dashboard
        technology: Azure Databricks
        description: Dashboard showing KPIs for demand predictions
      EvaluationJob:
        label: Evaluation Job
        technology: PySpark
        description: Compares real demand with predictions and creates dashboards
      DataExploration:
        label: Data Exploration Service
        technology: Jupyter Notebook
        description: Notebook environment for exploratory analysis

  DataWarehouse:
    label: Data Warehouse
    description: Company data warehouse
    boundary: External
    containers:
      SalesData:
        label: Sales Data
        technology: Azure Databricks
        description: Tables containing historical sales figures

  ERPSystem:
    label: ERP Software
    description: Software used to manage warehouse inventory
    boundary: External

relationships:
  - from: DataScientist
    to: DemandForecasting
    label: Develops
  - from: DataScientist
    to: DemandForecasting.PerformanceDashboard
    label: Analyses
  - from: DataScientist
    to: DemandForecasting.DataExploration
    label: Uses
  - from: StockController
    to: DemandForecasting.PerformanceDashboard
    label: Analyses
  - from: StockController
    to: ERPSystem
    label: Uses
  - from: DemandForecasting.PredictionPipeline
    to: DemandForecasting.ForecastStorage
    label: Writes forecasts to
  - from: DemandForecasting.PredictionPipeline
    to: DemandForecasting.ModelRegistry
    label: Loads model from
  - from: DemandForecasting.ModelTraining
    to: DemandForecasting.ModelRegistry
    label: Writes candidate model to
  - from: DemandForecasting.EvaluationJob
    to: DemandForecasting.ForecastStorage
    label: Reads forecasts
  - from: DemandForecasting.EvaluationJob
    to: DemandForecasting.PerformanceDashboard
    label: Writes data
  - from: DemandForecasting.EvaluationJob
    to: DataWarehouse.SalesData
    label: Reads sales figures
  - from: DemandForecasting.DataExploration
    to: DataWarehouse.SalesData
    label: Loads data from
  - from: DemandForecasting.ModelTraining
    to: DataWarehouse.SalesData
    label: Reads data from
  - from: ERPSystem
    to: DemandForecasting.ForecastStorage
    label: Reads data from
    protocol: JDBC
