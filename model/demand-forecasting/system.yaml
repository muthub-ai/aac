name: DemandForecasting
description: Architecture-as-Code model for the Demand Forecasting ML system on Google Cloud Platform.
model:
  people:
    - id: StockController
      name: Stock Controller
      description: Responsible for stock levels of products in a category
      relationships:
        - destinationId: DemandForecasting.PerformanceDashboard
          description: Analyses
          technology: HTTPS
        - destinationId: ERPSystem
          description: Uses
          technology: HTTPS
    - id: DataScientist
      name: Data Scientist
      description: Person involved in developing the machine learning model
      relationships:
        - destinationId: DemandForecasting
          description: Develops
        - destinationId: DemandForecasting.PerformanceDashboard
          description: Analyses
          technology: HTTPS
        - destinationId: DemandForecasting.DataExploration
          description: Uses
          technology: HTTPS
  softwareSystems:
    - id: DemandForecasting
      name: Demand Forecasting
      description: ML model predicting monthly product demand
      group: Supply Chain Analytics
      tags: ml,forecasting,gcp
      disposition: Invest
      dataClassification: Confidential
      properties:
        capabilitiy: Demand Planning
        risk: Medium
        pci: "No"
      containers:
        - id: ForecastStorage
          name: Forecast Storage
          description: OLTP database storing predicted demand per product per month
          technology: Cloud Firestore
          tags: database,gcp
          properties:
            type: database
            softwreType: SaaS
            hostingPlatform: GCP Serverless
            operatingSystem: linux
            dataClassification: Confidential
            unencryptedPAN: "false"
            vendor: Google
            version: native-mode
        - id: ModelRegistry
          name: Model Registry
          description: Storage for experiments, model artifacts, and metadata
          technology: Vertex AI Model Registry
          tags: ml,registry,gcp
          properties:
            type: other
            softwreType: SaaS
            hostingPlatform: Vertex AI
            operatingSystem: linux
            dataClassification: Internal Use
            unencryptedPAN: "false"
            vendor: Google
        - id: PredictionPipeline
          name: Prediction Pipeline
          description: Scheduled monthly pipeline predicting demand for all products
          technology: PySpark on Dataproc
          tags: batch,ml,gcp
          properties:
            type: batch
            softwreType: custom
            primaryLanguage: python
            deploymentType: single
            hostingPlatform: Dataproc
            operatingSystem: linux
            dataClassification: Confidential
            unencryptedPAN: "false"
          relationships:
            - destinationId: DemandForecasting.ForecastStorage
              description: Writes forecasts to
              technology: gRPC
            - destinationId: DemandForecasting.ModelRegistry
              description: Loads model from
              technology: REST
        - id: ModelTraining
          name: Model Training
          description: Pipeline that trains a new model based on input data
          technology: Vertex AI
          tags: ml,training,gcp
          properties:
            type: batch
            softwreType: SaaS
            primaryLanguage: python
            hostingPlatform: Vertex AI
            operatingSystem: linux
            dataClassification: Confidential
            unencryptedPAN: "false"
            vendor: Google
          relationships:
            - destinationId: DemandForecasting.ModelRegistry
              description: Writes candidate model to
              technology: REST
            - destinationId: DataWarehouse.SalesData
              description: Reads data from
              technology: BigQuery API
        - id: PerformanceDashboard
          name: Performance Dashboard
          description: Dashboard showing KPIs for demand predictions
          technology: Looker Studio
          tags: ui,dashboard,gcp
          properties:
            type: UI
            softwreType: SaaS
            hostingPlatform: GCP Serverless
            operatingSystem: linux
            dataClassification: Internal Use
            unencryptedPAN: "false"
            vendor: Google
        - id: EvaluationJob
          name: Evaluation Job
          description: Compares real demand with predictions and creates dashboards
          technology: PySpark on Dataproc
          tags: batch,evaluation,gcp
          properties:
            type: batch
            softwreType: custom
            primaryLanguage: python
            deploymentType: single
            hostingPlatform: Dataproc
            operatingSystem: linux
            dataClassification: Confidential
            unencryptedPAN: "false"
          relationships:
            - destinationId: DemandForecasting.ForecastStorage
              description: Reads forecasts
              technology: gRPC
            - destinationId: DemandForecasting.PerformanceDashboard
              description: Writes data
              technology: REST
            - destinationId: DataWarehouse.SalesData
              description: Reads sales figures
              technology: BigQuery API
        - id: DataExploration
          name: Data Exploration Service
          description: Notebook environment for exploratory analysis
          technology: Vertex AI Workbench
          tags: notebook,exploration,gcp
          properties:
            type: other
            softwreType: SaaS
            primaryLanguage: python
            hostingPlatform: Vertex AI
            operatingSystem: linux
            dataClassification: Internal Use
            unencryptedPAN: "false"
            vendor: Google
          relationships:
            - destinationId: DataWarehouse.SalesData
              description: Loads data from
              technology: BigQuery API
    - id: DataWarehouse
      name: Data Warehouse
      description: Company data warehouse
      group: Data Platform
      tags: data,warehouse,gcp
      disposition: Tolerate
      dataClassification: Confidential
      properties:
        capabilitiy: Enterprise Data Management
        risk: Low
        pci: "No"
      containers:
        - id: SalesData
          name: Sales Data
          description: Tables containing historical sales figures
          technology: BigQuery
          tags: database,analytics,gcp
          properties:
            type: database
            softwreType: SaaS
            hostingPlatform: GCP Serverless
            operatingSystem: linux
            dataClassification: Confidential
            unencryptedPAN: "false"
            vendor: Google
    - id: ERPSystem
      name: ERP Software
      description: Software used to manage warehouse inventory
      group: Enterprise Applications
      tags: erp,external
      disposition: Tolerate
      dataClassification: Internal Use
      properties:
        capabilitiy: Inventory Management
        risk: Low
        pci: "No"
      relationships:
        - destinationId: DemandForecasting.ForecastStorage
          description: Reads data from
          technology: JDBC
  deploymentNodes:
    # ── Global edge ─────────────────────────────────────────────
    - id: gcp-global
      name: Google Cloud Global
      environment: Production
      technology: GCP Global Infrastructure
      tags: gcp,global,production
      infrastructureNodes:
        - id: cloud-dns
          name: Cloud DNS
          technology: Google Cloud DNS
          tags: networking,dns,gcp
          properties:
            type: dns
          relationships:
            - destinationId: global-https-lb
              description: Resolves client requests to
              technology: DNS
        - id: global-https-lb
          name: Global HTTPS Load Balancer
          technology: Google Cloud External Application Load Balancer
          tags: networking,load-balancer,gcp
          properties:
            type: load-balancer
          relationships:
            - destinationId: DemandForecasting.PerformanceDashboard
              description: Routes dashboard traffic to nearest healthy region
              technology: HTTPS
        - id: cloud-cdn
          name: Cloud CDN
          technology: Google Cloud CDN
          tags: caching,cdn,gcp
          properties:
            type: cdn
          relationships:
            - destinationId: DemandForecasting.PerformanceDashboard
              description: Caches and serves static dashboard assets from
              technology: HTTPS
        - id: cloud-armor
          name: Cloud Armor
          technology: Google Cloud Armor
          tags: security,waf,gcp
          properties:
            type: waf
          relationships:
            - destinationId: global-https-lb
              description: Applies WAF and DDoS protection to
              technology: Security Policy

    # ── Region 1: us-central1 (Iowa) ───────────────────────────
    - id: gcp-us-central1
      name: Google Cloud us-central1
      environment: Production
      technology: GCP Region
      tags: gcp,production,us-central1
      infrastructureNodes:
        - id: us-internal-lb
          name: Internal Load Balancer
          technology: Google Cloud Internal TCP/UDP Load Balancer
          tags: networking,load-balancer,gcp
          properties:
            type: load-balancer
          relationships:
            - destinationId: DemandForecasting.PredictionPipeline
              description: Distributes batch traffic to
              technology: gRPC
        - id: us-cloud-nat
          name: Cloud NAT Gateway
          technology: Google Cloud NAT
          tags: networking,gcp
          properties:
            type: nat-gateway
        - id: us-vpc-firewall
          name: VPC Firewall
          technology: Google Cloud VPC Firewall Rules
          tags: networking,security,gcp
          properties:
            type: firewall
        - id: us-cloud-interconnect
          name: Cloud Interconnect
          technology: Google Cloud Dedicated Interconnect
          tags: networking,replication,gcp
          properties:
            type: interconnect
          relationships:
            - destinationId: eu-cloud-interconnect
              description: Cross-region VPC peering to europe-west1
              technology: Google Cloud VPC Network Peering
      children:
        - id: us-dataproc-cluster
          name: Dataproc Cluster
          technology: Google Cloud Dataproc
          tags: compute,spark,gcp
          containerInstances:
            - containerId: DemandForecasting.PredictionPipeline
              instanceId: 1
            - containerId: DemandForecasting.EvaluationJob
              instanceId: 1
        - id: us-vertex-ai-platform
          name: Vertex AI Platform
          technology: Google Cloud Vertex AI
          tags: ml,ai,gcp
          containerInstances:
            - containerId: DemandForecasting.ModelTraining
              instanceId: 1
            - containerId: DemandForecasting.ModelRegistry
              instanceId: 1
            - containerId: DemandForecasting.DataExploration
              instanceId: 1
        - id: us-firestore
          name: Cloud Firestore (Multi-Region nam5)
          technology: Google Cloud Firestore
          tags: database,nosql,gcp,multi-region
          containerInstances:
            - containerId: DemandForecasting.ForecastStorage
              instanceId: 1
        - id: us-looker-studio
          name: Looker Studio
          technology: Google Looker Studio
          tags: ui,dashboard,gcp
          containerInstances:
            - containerId: DemandForecasting.PerformanceDashboard
              instanceId: 1
        - id: us-bigquery
          name: BigQuery (US Multi-Region)
          technology: Google BigQuery
          tags: database,analytics,gcp,multi-region
          containerInstances:
            - containerId: DataWarehouse.SalesData
              instanceId: 1

    # ── Region 2: europe-west1 (Belgium) ───────────────────────
    - id: gcp-europe-west1
      name: Google Cloud europe-west1
      environment: Production
      technology: GCP Region
      tags: gcp,production,europe-west1
      infrastructureNodes:
        - id: eu-internal-lb
          name: Internal Load Balancer
          technology: Google Cloud Internal TCP/UDP Load Balancer
          tags: networking,load-balancer,gcp
          properties:
            type: load-balancer
          relationships:
            - destinationId: DemandForecasting.PredictionPipeline
              description: Distributes batch traffic to
              technology: gRPC
        - id: eu-cloud-nat
          name: Cloud NAT Gateway
          technology: Google Cloud NAT
          tags: networking,gcp
          properties:
            type: nat-gateway
        - id: eu-vpc-firewall
          name: VPC Firewall
          technology: Google Cloud VPC Firewall Rules
          tags: networking,security,gcp
          properties:
            type: firewall
        - id: eu-cloud-interconnect
          name: Cloud Interconnect
          technology: Google Cloud Dedicated Interconnect
          tags: networking,replication,gcp
          properties:
            type: interconnect
          relationships:
            - destinationId: us-cloud-interconnect
              description: Cross-region VPC peering to us-central1
              technology: Google Cloud VPC Network Peering
      children:
        - id: eu-dataproc-cluster
          name: Dataproc Cluster
          technology: Google Cloud Dataproc
          tags: compute,spark,gcp
          containerInstances:
            - containerId: DemandForecasting.PredictionPipeline
              instanceId: 2
            - containerId: DemandForecasting.EvaluationJob
              instanceId: 2
        - id: eu-vertex-ai-platform
          name: Vertex AI Platform
          technology: Google Cloud Vertex AI
          tags: ml,ai,gcp
          containerInstances:
            - containerId: DemandForecasting.ModelTraining
              instanceId: 2
            - containerId: DemandForecasting.ModelRegistry
              instanceId: 2
            - containerId: DemandForecasting.DataExploration
              instanceId: 2
        - id: eu-firestore
          name: Cloud Firestore (Multi-Region eur3)
          technology: Google Cloud Firestore
          tags: database,nosql,gcp,multi-region
          containerInstances:
            - containerId: DemandForecasting.ForecastStorage
              instanceId: 2
        - id: eu-looker-studio
          name: Looker Studio
          technology: Google Looker Studio
          tags: ui,dashboard,gcp
          containerInstances:
            - containerId: DemandForecasting.PerformanceDashboard
              instanceId: 2
        - id: eu-bigquery
          name: BigQuery (EU Multi-Region)
          technology: Google BigQuery
          tags: database,analytics,gcp,multi-region
          containerInstances:
            - containerId: DataWarehouse.SalesData
              instanceId: 2
views:
  systemContextViews:
    - key: DemandForecasting-SystemContext
      softwareSystemId: DemandForecasting
      title: Demand Forecasting System Context
      description: Shows the Demand Forecasting system in its environment with external actors and systems.
  containerViews:
    - key: DemandForecasting-Containers
      softwareSystemId: DemandForecasting
      title: Demand Forecasting Container View
      description: Internal containers and data flows within the Demand Forecasting system.
  deploymentViews:
    - key: DemandForecasting-Deployment-ActiveActive
      softwareSystemId: DemandForecasting
      environment: Production
      title: GCP Active-Active Multi-Region Deployment
      description: Active-active deployment across us-central1 (Iowa) and europe-west1 (Belgium) with Global HTTPS Load Balancer, Cloud CDN, Cloud Armor WAF, cross-region VPC peering, and multi-region Firestore/BigQuery replication.
