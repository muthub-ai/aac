name: ImageCategorizationSystem
description: Architecture for an ML-based image categorization system deployed on Google Cloud Platform
model:
  people:
  - id: Customer
    name: Customer
    description: Person wanting to sell second hand clothes
    relationships:
    - destinationId: BrowserApp
      description: Uses
    - destinationId: MobileApp
      description: Uses
  - id: DataScientist
    name: Data Scientist
    description: Person involved in developing the machine learning model
    relationships:
    - destinationId: ImageCategorization
      description: Develops
    - destinationId: LogAggregator
      description: Browses logs
    - destinationId: MonitoringService
      description: Views dashboard
    - destinationId: DataExploration
      description: Uses
  softwareSystems:
  - id: ImageCategorization
    name: Image Categorization
    description: ML model predicting product category for images uploaded by customers
    group: ML Platform
    tags: ml, internal
    disposition: Invest
    dataClassification: Confidential
    containers:
    - id: ModelApi
      name: Model API
      technology: Cloud Run (FastAPI)
      description: Web application serving predictions
      tags: api, ml
      properties:
        type: API
        softwreType: custom
        primaryLanguage: Python
        hostingPlatform: GCP
        operatingSystem: Linux
        deploymentType: active-active
        dataClassification: Confidential
      relationships:
      - destinationId: LogAggregator
        description: Sends logs
        technology: Cloud Pub/Sub
    - id: ModelTrainingPipeline
      name: Model Training Pipeline
      technology: Vertex AI Pipelines (Python)
      description: Loads and preprocesses data, and trains a model
      tags: ml, batch
      properties:
        type: batch
        softwreType: custom
        primaryLanguage: Python
        hostingPlatform: GCP
        operatingSystem: Linux
        deploymentType: single
        dataClassification: Confidential
      relationships:
      - destinationId: LogAggregator
        description: Sends logs
        technology: Cloud Pub/Sub
      - destinationId: ModelRegistry
        description: Stores trained model and metadata
      - destinationId: DataWarehouse
        description: Loads images and labels
    - id: CiCdPipeline
      name: CI/CD Pipeline
      technology: Cloud Build
      description: Runs automated tests and controls model version deployment
      tags: ci-cd
      properties:
        type: batch
        softwreType: SaaS
        primaryLanguage: Python
        hostingPlatform: GCP
        operatingSystem: Linux
        deploymentType: single
        dataClassification: Internal Use
      relationships:
      - destinationId: ImageCategorization.ModelApi
        description: Deploys
      - destinationId: ModelRegistry
        description: Downloads model artifact
  - id: LogAggregator
    name: Cloud Logging
    description: Receives, aggregates, and allows browsing of logs
    group: Infrastructure Services
    tags: logging, gcp-managed
    disposition: Tolerate
    dataClassification: Internal Use
  - id: MonitoringService
    name: Cloud Monitoring
    description: Metric collector and dashboards for system observability
    group: Infrastructure Services
    tags: monitoring, gcp-managed
    disposition: Tolerate
    dataClassification: Internal Use
    relationships:
    - destinationId: ImageCategorization.ModelApi
      description: Scrapes metrics
      technology: HTTP
  - id: ModelRegistry
    name: Vertex AI Model Registry
    description: Tracks experiments and stores versioned model artifacts
    group: ML Platform
    tags: ml, gcp-managed
    disposition: Tolerate
    dataClassification: Confidential
  - id: BrowserApp
    name: Browser Application
    description: Client browser web application
    group: Client Applications
    tags: frontend, external
    disposition: Invest
    dataClassification: Public
    relationships:
    - destinationId: BackendSystem
      description: Uploads image
      technology: HTTP
  - id: MobileApp
    name: Mobile Application
    description: Client mobile application
    group: Client Applications
    tags: frontend, external
    disposition: Invest
    dataClassification: Public
    relationships:
    - destinationId: BackendSystem
      description: Uploads image
      technology: HTTP
  - id: BackendSystem
    name: Backend System
    description: Backend application for uploading images
    group: Backend Services
    tags: backend, external
    disposition: Invest
    dataClassification: Confidential
    containers:
    - id: ImageDatabase
      name: Image Database
      technology: Cloud SQL for PostgreSQL
      description: Database containing images with product category labels
      tags: database
      properties:
        type: database
        softwreType: open-source
        primaryLanguage: SQL
        hostingPlatform: GCP
        operatingSystem: Linux
        deploymentType: active-passive
        dataClassification: Confidential
      relationships:
      - destinationId: DataWarehouse
        description: Stores images and labels
    relationships:
    - destinationId: ImageCategorization.ModelApi
      description: Sends image data
      technology: HTTP
  - id: DataWarehouse
    name: BigQuery
    description: Company-wide data warehouse for analytical purposes
    group: Data Platform
    tags: data, gcp-managed
    disposition: Tolerate
    dataClassification: Confidential
  - id: DataExploration
    name: Vertex AI Workbench
    description: Notebook environment for exploratory analysis
    group: Data Platform
    tags: data, gcp-managed
    disposition: Tolerate
    dataClassification: Internal Use
    relationships:
    - destinationId: DataWarehouse
      description: Loads data from
  deploymentNodes:
  # ── Global edge ─────────────────────────────────────────────
  - id: gcp-global
    name: Google Cloud Global
    environment: Production
    technology: GCP Global Infrastructure
    tags: gcp,global,production
    infrastructureNodes:
    - id: cloud-dns
      name: Cloud DNS
      technology: Google Cloud DNS
      tags: networking,dns,gcp
      properties:
        type: dns
      relationships:
      - destinationId: global-https-lb
        description: Resolves client requests to
        technology: DNS
    - id: global-https-lb
      name: Global HTTPS Load Balancer
      technology: Google Cloud External Application Load Balancer
      tags: networking,load-balancer,gcp
      properties:
        type: load-balancer
      relationships:
      - destinationId: ImageCategorization.ModelApi
        description: Routes API traffic to primary region with failover routing
        technology: HTTPS
    - id: cloud-cdn
      name: Cloud CDN
      technology: Google Cloud CDN
      tags: caching,cdn,gcp
      properties:
        type: cdn
      relationships:
      - destinationId: ImageCategorization.ModelApi
        description: Caches and serves static API responses from
        technology: HTTPS
    - id: cloud-armor
      name: Cloud Armor
      technology: Google Cloud Armor
      tags: security,waf,gcp
      properties:
        type: waf
      relationships:
      - destinationId: global-https-lb
        description: Applies WAF and DDoS protection to
        technology: Security Policy

  # ── Region 1: us-central1 (Iowa) — Primary ─────────────────
  - id: gcp-us-central1-primary
    name: Google Cloud us-central1 (Primary)
    environment: Production
    technology: GCP Region
    tags: gcp,production,us-central1,primary
    infrastructureNodes:
    - id: us-internal-lb
      name: Internal Load Balancer
      technology: Google Cloud Internal TCP/UDP Load Balancer
      tags: networking,load-balancer,gcp
      properties:
        type: load-balancer
      relationships:
      - destinationId: ImageCategorization.ModelApi
        description: Distributes API traffic to
        technology: HTTPS
    - id: us-cloud-nat
      name: Cloud NAT Gateway
      technology: Google Cloud NAT
      tags: networking,gcp
      properties:
        type: nat-gateway
    - id: us-vpc-firewall
      name: VPC Firewall
      technology: Google Cloud VPC Firewall Rules
      tags: networking,security,gcp
      properties:
        type: firewall
    - id: us-cloud-interconnect
      name: Cloud Interconnect
      technology: Google Cloud Dedicated Interconnect
      tags: networking,replication,gcp
      properties:
        type: interconnect
      relationships:
      - destinationId: eu-cloud-interconnect
        description: Cross-region replication to europe-west1 standby
        technology: Google Cloud VPC Network Peering
    children:
    - id: us-cloud-run
      name: Cloud Run
      technology: Google Cloud Run
      tags: compute,serverless,gcp
      containerInstances:
      - containerId: ImageCategorization.ModelApi
        instanceId: 1
    - id: us-vertex-ai
      name: Vertex AI Platform
      technology: Google Cloud Vertex AI
      tags: ml,ai,gcp
      containerInstances:
      - containerId: ImageCategorization.ModelTrainingPipeline
        instanceId: 1
    - id: us-cloud-build
      name: Cloud Build
      technology: Google Cloud Build
      tags: ci-cd,gcp
      containerInstances:
      - containerId: ImageCategorization.CiCdPipeline
        instanceId: 1
    - id: us-cloud-sql
      name: Cloud SQL (Primary)
      technology: Google Cloud SQL for PostgreSQL
      tags: database,sql,gcp,primary
      containerInstances:
      - containerId: BackendSystem.ImageDatabase
        instanceId: 1

  # ── Region 2: europe-west1 (Belgium) — Standby ─────────────
  - id: gcp-europe-west1-standby
    name: Google Cloud europe-west1 (Standby)
    environment: Production
    technology: GCP Region
    tags: gcp,production,europe-west1,standby
    infrastructureNodes:
    - id: eu-internal-lb
      name: Internal Load Balancer (Standby)
      technology: Google Cloud Internal TCP/UDP Load Balancer
      tags: networking,load-balancer,gcp,standby
      properties:
        type: load-balancer
      relationships:
      - destinationId: ImageCategorization.ModelApi
        description: Distributes API traffic to (on failover)
        technology: HTTPS
    - id: eu-cloud-nat
      name: Cloud NAT Gateway
      technology: Google Cloud NAT
      tags: networking,gcp
      properties:
        type: nat-gateway
    - id: eu-vpc-firewall
      name: VPC Firewall
      technology: Google Cloud VPC Firewall Rules
      tags: networking,security,gcp
      properties:
        type: firewall
    - id: eu-cloud-interconnect
      name: Cloud Interconnect
      technology: Google Cloud Dedicated Interconnect
      tags: networking,replication,gcp
      properties:
        type: interconnect
      relationships:
      - destinationId: us-cloud-interconnect
        description: Cross-region replication to us-central1 primary
        technology: Google Cloud VPC Network Peering
    children:
    - id: eu-cloud-run
      name: Cloud Run (Standby)
      technology: Google Cloud Run
      tags: compute,serverless,gcp,standby
      containerInstances:
      - containerId: ImageCategorization.ModelApi
        instanceId: 2
    - id: eu-vertex-ai
      name: Vertex AI Platform (Standby)
      technology: Google Cloud Vertex AI
      tags: ml,ai,gcp,standby
      containerInstances:
      - containerId: ImageCategorization.ModelTrainingPipeline
        instanceId: 2
    - id: eu-cloud-build
      name: Cloud Build (Standby)
      technology: Google Cloud Build
      tags: ci-cd,gcp,standby
      containerInstances:
      - containerId: ImageCategorization.CiCdPipeline
        instanceId: 2
    - id: eu-cloud-sql
      name: Cloud SQL (Standby Replica)
      technology: Google Cloud SQL for PostgreSQL
      tags: database,sql,gcp,standby
      containerInstances:
      - containerId: BackendSystem.ImageDatabase
        instanceId: 2
views:
  systemContextViews:
  - key: ImageCategorization-SystemContext
    softwareSystemId: ImageCategorization
    description: System context diagram for the Image Categorization system
  containerViews:
  - key: ImageCategorization-Containers
    softwareSystemId: ImageCategorization
    description: Container diagram for the Image Categorization system
  deploymentViews:
  - key: ImageCategorization-Deployment-ActivePassive
    softwareSystemId: ImageCategorization
    environment: Production
    title: GCP Active-Passive Multi-Region Deployment
    description: Active-passive deployment across us-central1 (Primary) and europe-west1 (Standby) with Global HTTPS Load Balancer, failover routing, Cloud CDN, Cloud Armor WAF, cross-region replication, and Cloud SQL standby replica.
