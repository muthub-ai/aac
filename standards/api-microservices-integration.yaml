scope:
  inScope:
    - "RESTful API design and versioning standards"
    - "gRPC service-to-service communication"
    - "API gateway configuration and rate limiting"
    - "Asynchronous messaging patterns (event-driven)"
    - "Service mesh observability and mTLS"
  outOfScope:
    - "External partner/public API monetization"
    - "Legacy SOAP/XML integration (covered by migration standard)"
    - "Database-to-database replication"

requirements:
  - id: "REQ-001"
    statement: "All internal APIs MUST be documented with an OpenAPI 3.x specification and registered in the central API catalog."
    severity: "MUST"
    rationale: "A centralized API catalog with OpenAPI specs enables automated code generation, consistent documentation, and API discoverability across teams."
    verification: "CI/CD pipeline validates presence of OpenAPI spec; API gateway registration is confirmed via automated catalog audit."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
  - id: "REQ-002"
    statement: "API versioning MUST use URI path versioning (e.g., /v1/resource) for RESTful APIs."
    severity: "MUST"
    rationale: "URI path versioning provides explicit, visible version management that is easy to route, cache, and monitor at the API gateway level."
    verification: "API gateway routing rules enforce version prefix patterns; automated linting checks API paths during code review."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
  - id: "REQ-003"
    statement: "API gateway MUST enforce rate limiting on all registered endpoints with configurable thresholds per consumer."
    severity: "MUST"
    rationale: "Rate limiting protects backend services from traffic spikes, prevents abuse, and ensures fair resource allocation across API consumers."
    verification: "API gateway configuration audit confirms rate limit policies; load testing validates rate limiting behavior under stress."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
  - id: "REQ-004"
    statement: "Services SHOULD implement circuit breaker patterns for all synchronous downstream dependencies."
    severity: "SHOULD"
    rationale: "Circuit breakers prevent cascading failures by stopping requests to unhealthy downstream services, allowing them to recover without being overwhelmed."
    verification: "Service configuration review confirms circuit breaker settings; chaos engineering tests validate circuit breaker activation under failure conditions."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
  - id: "REQ-005"
    statement: "All service-to-service communication MUST use mutual TLS (mTLS) encryption within the service mesh."
    severity: "MUST"
    rationale: "mTLS ensures both authentication and encryption of inter-service traffic, preventing man-in-the-middle attacks and unauthorized service impersonation."
    verification: "Service mesh configuration audit confirms mTLS enforcement; network traffic analysis validates encrypted communication between services."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
  - id: "REQ-006"
    statement: "Asynchronous event schemas MUST be registered in a centralized schema registry with backward compatibility validation."
    severity: "MUST"
    rationale: "A schema registry with compatibility checks prevents breaking changes to event contracts, ensuring reliable event-driven communication between decoupled services."
    verification: "Schema registry audit confirms all event topics have registered schemas; CI/CD pipeline rejects schema changes that break backward compatibility."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"

guidelines:
  - id: "GUIDE-001"
    text: "API naming conventions should follow kebab-case for URI paths (e.g., /user-profiles) and camelCase for JSON property names. Resource names should be plural nouns. Avoid verbs in URIs; use HTTP methods to convey actions."
  - id: "GUIDE-002"
    text: "Pagination should be implemented using cursor-based pagination for large datasets. Responses should include next and previous cursor tokens. Offset-based pagination is acceptable for small, stable datasets but should include total count headers."
  - id: "GUIDE-003"
    text: "Error responses should follow RFC 7807 Problem Details format with type, title, status, detail, and instance fields. Include a correlation ID header (X-Correlation-ID) in all requests and responses for distributed tracing."
  - id: "GUIDE-004"
    text: "Event-driven patterns should use CloudEvents specification for event envelope format. Design events as immutable facts using past-tense naming (e.g., OrderPlaced, PaymentProcessed). Consumers should be idempotent and handle out-of-order delivery."

solutions:
  - id: "SOL-001"
    name: "Kong API Gateway"
    description: "Cloud-native API gateway providing rate limiting, authentication, load balancing, and observability for RESTful and gRPC APIs. Supports plugin-based extensibility and declarative configuration."
    link: "https://konghq.com/"
  - id: "SOL-002"
    name: "Envoy Proxy with Istio Service Mesh"
    description: "Service mesh platform providing mTLS, traffic management, observability, and circuit breaking for microservices. Envoy sidecars handle service-to-service communication transparently."
    link: "https://istio.io/"
  - id: "SOL-003"
    name: "Apache Kafka with Confluent Schema Registry"
    description: "Distributed event streaming platform for asynchronous messaging with schema registry for Avro, Protobuf, and JSON Schema validation. Supports exactly-once semantics and cross-datacenter replication."
    link: "https://kafka.apache.org/"

