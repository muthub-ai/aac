definitions:
  - id: "DEF-001"
    term: "API Gateway"
    definition: "A server that acts as a single entry point for API consumers, providing cross-cutting concerns such as authentication, rate limiting, request routing, and protocol translation."
  - id: "DEF-002"
    term: "Service Mesh"
    definition: "A dedicated infrastructure layer for managing service-to-service communication within a microservices architecture, typically implemented via sidecar proxies that handle traffic management, security, and observability."
  - id: "DEF-003"
    term: "Circuit Breaker"
    definition: "A design pattern that detects failures in downstream services and stops sending requests to them when a failure threshold is exceeded, allowing the failing service to recover and preventing cascading failures."

faq:
  - id: "FAQ-001"
    question: "When should we use gRPC versus REST for service-to-service communication?"
    answer: "Use gRPC for high-performance, low-latency internal service communication where strong typing and bidirectional streaming are beneficial. Use REST for external-facing APIs, browser-based clients, and services that benefit from human-readable payloads and broader tooling ecosystem support."
  - id: "FAQ-002"
    question: "How do we handle API versioning for breaking changes?"
    answer: "Deploy the new API version (e.g., /v2/resource) alongside the existing version. Communicate a deprecation timeline of at least 90 days. Monitor usage of the old version and work with consumers to migrate. Only retire the old version after all consumers have transitioned."
  - id: "FAQ-003"
    question: "Is the schema registry mandatory for all event-driven communication?"
    answer: "Yes, all asynchronous event schemas must be registered in the schema registry. This applies to Kafka topics, message queues, and event bus channels. The registry enforces backward compatibility and provides a single source of truth for event contracts across teams."

