scope:
  inScope:
    - "Terraform and OpenTofu module standards"
    - "GitOps workflows for infrastructure changes"
    - "Policy-as-code enforcement with OPA/Sentinel"
    - "Infrastructure drift detection and remediation"
    - "Module registry and shared module governance"
  outOfScope:
    - "Application deployment pipelines (covered by CI/CD standard)"
    - "Container orchestration and Kubernetes configuration"
    - "Network infrastructure managed by network operations"

requirements:
  - id: "REQ-001"
    statement: "All infrastructure changes MUST be deployed through version-controlled IaC pipelines."
    severity: "MUST"
    rationale: "Version-controlled IaC pipelines ensure auditability, reproducibility, and peer review of all infrastructure modifications, reducing the risk of configuration errors and unauthorized changes."
    verification: "Audit CI/CD pipeline logs to confirm all production infrastructure changes originate from IaC pipeline runs; cross-reference with cloud provider activity logs."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
  - id: "REQ-002"
    statement: "Infrastructure modules MUST pass policy-as-code validation before apply."
    severity: "MUST"
    rationale: "Policy-as-code validation enforces security, compliance, and cost guardrails automatically before any infrastructure change is applied, shifting governance left in the deployment process."
    verification: "Review pipeline configurations to confirm policy-as-code gates (OPA/Sentinel) are integrated and enforced prior to terraform apply stages."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
  - id: "REQ-003"
    statement: "Manual infrastructure changes MUST NOT be made to production environments."
    severity: "MUST NOT"
    rationale: "Manual changes introduce configuration drift, bypass peer review and policy checks, and create undocumented state that cannot be reliably reproduced or rolled back."
    verification: "Enable cloud provider guardrails (e.g., AWS SCPs, Azure Policy) to restrict console-based modifications; run weekly drift detection scans to identify unauthorized changes."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
  - id: "REQ-004"
    statement: "Shared Terraform modules SHOULD be published to the internal module registry with semantic versioning."
    severity: "SHOULD"
    rationale: "A centralized module registry with semantic versioning promotes reuse, consistency, and controlled upgrades across teams while avoiding duplicated infrastructure logic."
    verification: "Review module registry catalog for published modules; verify that each module uses semantic versioning and includes documentation and examples."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
  - id: "REQ-005"
    statement: "Infrastructure drift detection SHOULD run daily with automated alerting."
    severity: "SHOULD"
    rationale: "Daily drift detection identifies unauthorized or accidental changes promptly, enabling rapid remediation before drift compounds and causes operational issues."
    verification: "Confirm drift detection jobs are scheduled daily in the CI/CD platform; validate that alerts are routed to the responsible platform team's notification channel."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
  - id: "REQ-006"
    statement: "State files MUST be stored in encrypted remote backends with state locking enabled."
    severity: "MUST"
    rationale: "Remote state with encryption protects sensitive infrastructure metadata at rest and in transit, while state locking prevents concurrent modifications that could corrupt infrastructure state."
    verification: "Audit Terraform backend configurations to confirm remote storage (e.g., S3, GCS, Azure Blob) with encryption enabled and DynamoDB/equivalent locking mechanisms in place."
    appliesTo:
      platforms:
        - "AWS"
        - "Azure"
        - "GCP"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"

guidelines:
  - id: "GUIDE-001"
    text: "Module Structure: Organize Terraform modules using a consistent directory layout with separate directories for environments, modules, and configuration. Each module should have a README, input variables with descriptions, output definitions, and example usage. Pin provider versions and use dependency lock files."
  - id: "GUIDE-002"
    text: "State Management: Use separate state files per environment and per service boundary to limit blast radius. Enable versioning on state storage backends to allow rollback. Never store secrets in state files; use data sources or secret manager references instead. Implement state file access controls using IAM policies."
  - id: "GUIDE-003"
    text: "Secret Handling in IaC: Never hardcode secrets in Terraform code or variable files. Use dynamic secret retrieval from a secrets manager (e.g., HashiCorp Vault, AWS Secrets Manager) via data sources. Mark sensitive variables with the sensitive flag to prevent accidental exposure in logs and plan output."

solutions:
  - id: "SOL-001"
    name: "Terraform Cloud"
    description: "HashiCorp's managed platform for Terraform providing remote state management, policy-as-code with Sentinel, VCS-driven workflows, private module registry, and cost estimation for infrastructure changes."
    link: "https://www.hashicorp.com/products/terraform"
  - id: "SOL-002"
    name: "Spacelift"
    description: "Infrastructure-as-code management platform supporting Terraform, OpenTofu, Pulumi, and CloudFormation with policy-as-code, drift detection, approval workflows, and stack dependencies."
    link: "https://spacelift.io"
  - id: "SOL-003"
    name: "Open Policy Agent"
    description: "General-purpose policy engine that enables policy-as-code enforcement for Terraform plans, Kubernetes admission control, and API authorization using the Rego policy language."
    link: "https://www.openpolicyagent.org"

