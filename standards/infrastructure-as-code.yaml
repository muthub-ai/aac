definitions:
  - id: "DEF-001"
    term: "GitOps"
    definition: "An operational framework that applies DevOps best practices for infrastructure automation by using Git repositories as the single source of truth for declarative infrastructure and application configurations, with automated reconciliation ensuring the live environment matches the desired state."
  - id: "DEF-002"
    term: "Policy-as-Code"
    definition: "The practice of expressing organizational policies, security rules, and compliance requirements as machine-readable code that can be version-controlled, tested, and automatically enforced within CI/CD pipelines and runtime environments."
  - id: "DEF-003"
    term: "Infrastructure Drift"
    definition: "The divergence between the actual state of deployed infrastructure and the desired state defined in infrastructure-as-code configurations, typically caused by manual changes, failed deployments, or external modifications outside the IaC workflow."

faq:
  - id: "FAQ-001"
    question: "What should teams do when an emergency hotfix requires an immediate infrastructure change that cannot wait for the standard IaC pipeline?"
    answer: "Emergency changes should follow the documented break-glass procedure which allows temporary manual access with enhanced logging. All emergency changes must be retroactively codified in IaC within 24 hours, and a post-incident review must document the change and update runbooks to prevent recurrence."
  - id: "FAQ-002"
    question: "How do we handle infrastructure that was provisioned before this standard was enacted?"
    answer: "Existing infrastructure should be imported into Terraform state using terraform import or equivalent tooling. Teams should prioritize importing Tier 1 and Tier 2 workloads within six months and complete all tiers within twelve months. The Platform Engineering team provides import tooling and migration guides."

