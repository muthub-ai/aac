definitions:
  - id: "DEF-001"
    term: "Data Catalog"
    definition: "A centralized inventory of data assets within an organization that provides metadata management, data discovery, and governance capabilities to enable users to find, understand, and trust data."
  - id: "DEF-002"
    term: "Data Mesh"
    definition: "A decentralized data architecture paradigm that organizes data around business domains, treats data as a product with dedicated ownership, and provides self-serve data infrastructure as a platform."
  - id: "DEF-003"
    term: "Data Lineage"
    definition: "The complete lifecycle of data from its origin through all transformations, movements, and aggregations, providing a traceable path that documents how data is created, modified, and consumed."

faq:
  - id: "FAQ-001"
    question: "Does the data catalog registration requirement apply to temporary or experimental pipelines?"
    answer: "No. Only production and pre-production data pipelines that serve downstream consumers or business reporting require catalog registration. However, experimental pipelines should be tagged and tracked in the development workspace to prevent promotion without proper cataloging."
  - id: "FAQ-002"
    question: "How should teams handle data sharing across business domains under the data mesh model?"
    answer: "Cross-domain data sharing should be facilitated through well-defined data products with published contracts, SLAs, and access policies. Use the enterprise data marketplace to publish and discover data products, and establish data sharing agreements between domain teams before consumption begins."
  - id: "FAQ-003"
    question: "Can teams use data platform tools not listed in the approved solutions?"
    answer: "Teams may propose alternative tools by submitting an Architecture Decision Record (ADR) to the Data Governance Council. The proposal must include a comparison with approved solutions, total cost of ownership analysis, and a plan for integration with the enterprise data catalog and governance framework."

