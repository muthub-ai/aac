definitions:
  - id: "DEF-001"
    term: "Retrieval-Augmented Generation (RAG)"
    definition: "A pattern that enhances LLM responses by retrieving relevant documents from an external knowledge base and including them as context in the prompt, grounding outputs in factual enterprise data."
  - id: "DEF-002"
    term: "Guardrails"
    definition: "Safety mechanisms implemented around LLM inputs and outputs to filter harmful content, enforce topic boundaries, prevent data leakage, and ensure responses comply with organizational policies."
  - id: "DEF-003"
    term: "Prompt Injection"
    definition: "An adversarial attack where malicious instructions are embedded in user input to manipulate an LLM into ignoring its system prompt, bypassing safety controls, or revealing confidential information."
  - id: "DEF-004"
    term: "Token"
    definition: "The fundamental unit of text processing for LLMs. A token typically represents 3-4 characters of English text. Token counts determine both the context window limits and the cost of LLM API calls."

faq:
  - id: "FAQ-001"
    question: "Can we use public LLM APIs like ChatGPT for internal business applications?"
    answer: "Public LLM APIs may only be used for non-sensitive, non-confidential use cases after completing a risk assessment. For any workload involving PII, proprietary data, or customer information, you must use approved private endpoints (Azure OpenAI Service or AWS Bedrock) with enterprise data protection controls."
  - id: "FAQ-002"
    question: "What is the process for getting a new GenAI use case approved?"
    answer: "Submit a GenAI Use Case Proposal through the AI Center of Excellence. The proposal must include a data classification assessment, risk evaluation, cost estimate, guardrail implementation plan, and human oversight design. The AI Review Board evaluates proposals within 10 business days."
  - id: "FAQ-003"
    question: "How do we handle hallucinations in customer-facing GenAI applications?"
    answer: "Implement RAG patterns to ground responses in verified enterprise data. Add confidence scoring and citation of source documents. Use output validation rules to detect and filter unsupported claims. For high-stakes interactions, implement human-in-the-loop review before responses are delivered to customers."

