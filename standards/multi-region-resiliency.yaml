definitions:
  - id: "DEF-001"
    term: "Recovery Time Objective (RTO)"
    definition: "The maximum acceptable amount of time that a service can be offline or unavailable after a failure or disaster before business impact becomes unacceptable."
  - id: "DEF-002"
    term: "Recovery Point Objective (RPO)"
    definition: "The maximum acceptable amount of data loss measured in time. An RPO of 1 minute means at most 1 minute of data may be lost during a failure event."
  - id: "DEF-003"
    term: "Active-Active"
    definition: "A deployment topology where two or more regions simultaneously serve production traffic, with each region capable of handling the full workload independently if other regions become unavailable."

faq:
  - id: "FAQ-001"
    question: "What is the difference between active-active and active-passive multi-region deployment?"
    answer: "In active-active, all regions serve live traffic simultaneously, providing lower latency and immediate failover. In active-passive, the secondary region is on standby and only activated during a failover event, resulting in higher RTO but potentially simpler data consistency management."
  - id: "FAQ-002"
    question: "How do we handle data consistency across regions in an active-active setup?"
    answer: "Use conflict-free replicated data types (CRDTs) or last-writer-wins strategies for eventually consistent data. For strong consistency requirements, designate a primary region for writes and use synchronous replication with consensus protocols. The choice depends on the service's CAP theorem trade-offs."
  - id: "FAQ-003"
    question: "Are Tier 2 services required to implement active-active multi-region deployment?"
    answer: "Tier 2 services are not required to implement active-active deployment but SHOULD follow the standard where feasible. At minimum, Tier 2 services must have a documented disaster recovery plan with defined RTO and RPO targets appropriate to their business criticality."

