scope:
  inScope:
    - "All production ML models deployed to enterprise infrastructure"
    - "Model training pipelines and feature stores"
    - "Model monitoring, drift detection, and retraining triggers"
    - "Model versioning, lineage tracking, and artifact management"
    - "Bias and fairness assessment for customer-facing models"
  outOfScope:
    - "Research and experimentation notebooks not promoted to production"
    - "Third-party SaaS ML features embedded in vendor products"
    - "Statistical models built entirely within BI tools"

requirements:
  - id: "REQ-001"
    statement: "All production ML models MUST be registered in the enterprise model registry with complete metadata including owner, training data lineage, and performance baselines."
    severity: "MUST"
    rationale: "A centralized model registry ensures visibility into all production models, enables auditability, and prevents ungoverned shadow models from reaching production environments."
    verification: "Automated registry completeness scan executed weekly via CI/CD pipeline validation"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"
  - id: "REQ-002"
    statement: "Model training pipelines MUST produce reproducible results with pinned dependency versions and deterministic seed values."
    severity: "MUST"
    rationale: "Reproducibility is essential for debugging model behavior, satisfying regulatory audit requirements, and enabling reliable rollback to previous model versions."
    verification: "Pipeline reproducibility test comparing outputs across two identical training runs with fixed seeds"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"
  - id: "REQ-003"
    statement: "Customer-facing models MUST undergo bias and fairness assessment using approved tooling before production deployment."
    severity: "MUST"
    rationale: "Bias in customer-facing models can cause reputational damage, regulatory penalties, and harm to underrepresented groups, making pre-deployment assessment critical."
    verification: "Bias assessment report generated by approved fairness toolkit attached to deployment approval workflow"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"
  - id: "REQ-004"
    statement: "Models SHOULD implement automated drift detection with configurable alert thresholds."
    severity: "SHOULD"
    rationale: "Data and concept drift degrade model performance over time; automated detection enables proactive retraining before business impact occurs."
    verification: "Drift monitoring dashboard review and alert configuration audit conducted quarterly"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"
  - id: "REQ-005"
    statement: "Production models MUST NOT be deployed without a documented rollback strategy and shadow deployment validation."
    severity: "MUST NOT"
    rationale: "Deploying models without rollback capabilities risks prolonged production incidents if the new model performs poorly, potentially impacting revenue and customer experience."
    verification: "Deployment checklist gate in CI/CD pipeline requiring rollback plan document and shadow deployment test results"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"
  - id: "REQ-006"
    statement: "Model inference endpoints SHOULD expose standardized health check and performance metrics."
    severity: "SHOULD"
    rationale: "Standardized metrics enable consistent monitoring across all model endpoints, simplify incident response, and support capacity planning for inference infrastructure."
    verification: "Endpoint health check and metrics endpoint validation as part of deployment smoke tests"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"
  - id: "REQ-007"
    statement: "Feature stores MUST enforce schema versioning and backward compatibility for shared features."
    severity: "MUST"
    rationale: "Breaking changes to shared features can cascade across multiple downstream models, causing simultaneous failures and making root cause analysis extremely difficult."
    verification: "Schema compatibility check integrated into feature store CI/CD pipeline with automated backward compatibility tests"
    appliesTo:
      platforms:
        - "AWS SageMaker"
        - "Azure ML"
        - "GCP Vertex AI"
      tiers:
        - "Tier 1"
        - "Tier 2"
      exceptionsProcess: "Submit exception request to ML Governance Board"

guidelines:
  - id: "GL-001"
    text: "Use experiment tracking tools (MLflow, Weights & Biases) for all model development to ensure reproducibility"
  - id: "GL-002"
    text: "Implement A/B testing frameworks for all customer-facing model updates before full rollout"
  - id: "GL-003"
    text: "Maintain model cards documenting intended use, limitations, and ethical considerations"

solutions:
  - id: "SOL-001"
    name: "MLflow"
    description: "Open-source platform for ML lifecycle management"
  - id: "SOL-002"
    name: "AWS SageMaker Model Registry"
    description: "Managed model versioning and deployment service"
  - id: "SOL-003"
    name: "Evidently AI"
    description: "ML monitoring and drift detection platform"

