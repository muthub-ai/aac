definitions:
  - id: "DEF-001"
    term: "Model Registry"
    definition: "A centralized repository that stores model artifacts, metadata, versioning information, and deployment status for all machine learning models across the enterprise."
  - id: "DEF-002"
    term: "Feature Store"
    definition: "A centralized platform for storing, managing, and serving machine learning features, enabling feature reuse across models and ensuring consistency between training and inference."
  - id: "DEF-003"
    term: "Model Drift"
    definition: "The degradation of model performance over time due to changes in the statistical properties of input data (data drift) or changes in the relationship between inputs and outputs (concept drift)."

faq:
  - id: "FAQ-001"
    question: "Do research and experimentation models need to be registered in the model registry?"
    answer: "No. Only models promoted to production or pre-production staging environments require registration. However, teams are encouraged to use experiment tracking tools during research to facilitate future promotion."
  - id: "FAQ-002"
    question: "How do we handle bias assessment for models that do not directly interact with customers but influence customer-facing decisions?"
    answer: "Models that indirectly influence customer-facing outcomes, such as recommendation ranking models or risk scoring engines, should also undergo bias assessment. Consult the ML Governance Board if the applicability is unclear."
  - id: "FAQ-003"
    question: "What is the process for requesting an exception to a MUST requirement?"
    answer: "Submit an exception request to the ML Governance Board via the Architecture Exception Portal. The request must include a risk assessment, proposed compensating controls, and a timeline for achieving full compliance."

