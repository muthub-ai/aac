definitions:
  - id: "DEF-001"
    term: "Rightsizing"
    definition: "The process of analyzing cloud resource utilization metrics and adjusting instance types, storage tiers, or configurations to match actual workload requirements, eliminating over-provisioning while maintaining performance and availability targets."
  - id: "DEF-002"
    term: "Reserved Instance"
    definition: "A billing discount mechanism offered by cloud providers where customers commit to a specific instance type and region for a one- or three-year term in exchange for significantly reduced hourly rates compared to on-demand pricing."
  - id: "DEF-003"
    term: "FinOps"
    definition: "An evolving cloud financial management discipline and cultural practice that enables organizations to get maximum business value by helping engineering, finance, and business teams collaborate on data-driven spending decisions around cloud infrastructure and services."

faq:
  - id: "FAQ-001"
    question: "How do we handle rightsizing recommendations that conflict with application performance requirements?"
    answer: "Rightsizing recommendations should be validated against application-specific performance baselines before implementation. If a recommendation would degrade performance below acceptable thresholds, teams should document the exception with supporting metrics in the FinOps platform and re-evaluate during the next quarterly review cycle."
  - id: "FAQ-002"
    question: "Should reserved instances be purchased centrally or by individual teams?"
    answer: "Reserved instances and savings plans should be purchased centrally by the FinOps team to maximize flexibility and coverage across the organization. Central procurement enables pooling of commitments, better discount tiers, and avoidance of overlapping or underutilized reservations. Individual teams provide demand forecasts quarterly to inform purchasing decisions."

