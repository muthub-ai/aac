  - id: "SOL-002"
    name: "Kubecost"
    description: "Kubernetes cost monitoring and optimization platform providing real-time cost allocation, rightsizing recommendations for pods and nodes, cluster efficiency scoring, and integration with cloud provider billing APIs."
    link: "https://www.kubecost.com"
  - id: "SOL-003"
    name: "Apptio Cloudability"
    description: "Multi-cloud FinOps platform offering cost allocation, rightsizing recommendations, reserved instance management, anomaly detection, and executive dashboards for cloud financial management."
    link: "https://www.apptio.com/products/cloudability/"

