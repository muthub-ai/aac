definitions:
  - id: "DEF-001"
    term: "CIAM"
    definition: "Customer Identity and Access Management - a category of identity management focused on managing and securing the identities, authentication, and authorization of external customers, partners, and consumers interacting with an organization's digital services."
  - id: "DEF-002"
    term: "Progressive Profiling"
    definition: "An identity management technique that collects customer profile information incrementally over multiple interactions rather than requiring all data upfront during registration, reducing friction and abandonment while building comprehensive customer profiles over time."
  - id: "DEF-003"
    term: "Passwordless Authentication"
    definition: "An authentication method that verifies user identity without requiring a traditional password, instead using alternatives such as biometrics, hardware security keys (FIDO2/WebAuthn), magic links, or one-time codes delivered via email or SMS."

faq:
  - id: "FAQ-001"
    question: "Why is this standard marked as RETIRED and what replaces it?"
    answer: "This standard was retired in version 3.0 as the organization transitioned to a next-generation identity platform standard that incorporates decentralized identity, verifiable credentials, and advanced adaptive authentication. Existing applications should plan migration to the new standard. The replacement standard ID will be communicated through the Architecture Review Board."
  - id: "FAQ-002"
    question: "How should teams handle the transition from password-based to passwordless authentication?"
    answer: "Teams should adopt a phased approach: first enable passwordless as an optional login method alongside passwords, then promote passwordless through UX nudges and reduced friction, and finally set a target date for password deprecation. The CIAM platform supports running both methods in parallel during the transition period."
  - id: "FAQ-003"
    question: "Can applications use a different identity provider than the approved CIAM platform?"
    answer: "No, all customer-facing applications must use the centralized CIAM platform as per REQ-001. If an application has a technical constraint preventing integration, an exception request must be submitted through the Architecture Review Board with a migration plan not exceeding 12 months. The exception must include a risk assessment and interim security controls."

references:
