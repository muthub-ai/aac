scope:
  inScope:
    - "Customer authentication flows (login, registration, password reset)"
    - "OAuth 2.0 and OpenID Connect implementation"
    - "Multi-factor authentication and passwordless options"
    - "Consent management and progressive profiling"
    - "Session management and token lifecycle"
  outOfScope:
    - "Employee/workforce identity management"
    - "Service-to-service authentication (covered by API Standard)"
    - "Physical access control systems"

requirements:
  - id: "REQ-001"
    statement: "Customer-facing applications MUST authenticate through the centralized CIAM platform."
    severity: "MUST"
    rationale: "Centralized authentication ensures consistent security controls, unified customer experience, single sign-on capabilities, and consolidated audit logging across all customer touchpoints."
    verification: "Audit application configurations to confirm authentication is delegated to the CIAM platform; review network traffic to verify no direct credential validation occurs within application code."
    appliesTo:
      platforms:
        - "Web"
        - "iOS"
        - "Android"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
      exceptionsProcess: "Legacy applications that cannot integrate with the CIAM platform must submit an exception request with a migration timeline not exceeding 12 months."
  - id: "REQ-002"
    statement: "All authentication flows MUST support multi-factor authentication."
    severity: "MUST"
    rationale: "Multi-factor authentication significantly reduces the risk of account takeover attacks by requiring an additional verification factor beyond passwords, protecting customer accounts and sensitive data."
    verification: "Test all authentication entry points to confirm MFA enrollment prompts and step-up authentication flows are functional; verify MFA adoption metrics in the CIAM platform dashboard."
    appliesTo:
      platforms:
        - "Web"
        - "iOS"
        - "Android"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
      exceptionsProcess: "Legacy applications that cannot integrate with the CIAM platform must submit an exception request with a migration timeline not exceeding 12 months."
  - id: "REQ-003"
    statement: "Applications SHOULD NOT store customer passwords locally; delegate to CIAM provider."
    severity: "SHOULD NOT"
    rationale: "Local password storage increases the attack surface and risk of credential exposure. Delegating credential management to the CIAM provider ensures industry-standard hashing, salting, and breach detection capabilities."
    verification: "Review application codebases and database schemas for password storage; confirm that authentication is fully delegated to the CIAM platform with no local credential tables."
    appliesTo:
      platforms:
        - "Web"
        - "iOS"
        - "Android"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
      exceptionsProcess: "Legacy applications that cannot integrate with the CIAM platform must submit an exception request with a migration timeline not exceeding 12 months."
  - id: "REQ-004"
    statement: "OAuth 2.0 access tokens MUST have maximum lifetime of 1 hour with refresh token rotation."
    severity: "MUST"
    rationale: "Short-lived access tokens limit the window of exposure if a token is compromised, while refresh token rotation ensures that stolen refresh tokens are automatically invalidated upon use by a legitimate client."
    verification: "Inspect CIAM platform token policies to confirm access token TTL is set to 3600 seconds or less; verify refresh token rotation is enabled and that reuse detection triggers token revocation."
    appliesTo:
      platforms:
        - "Web"
        - "iOS"
        - "Android"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
      exceptionsProcess: "Legacy applications that cannot integrate with the CIAM platform must submit an exception request with a migration timeline not exceeding 12 months."
  - id: "REQ-005"
    statement: "Registration flows SHOULD implement progressive profiling to minimize friction."
    severity: "SHOULD"
    rationale: "Progressive profiling collects customer information incrementally over time rather than requiring extensive data entry during registration, reducing abandonment rates and improving conversion while still building rich customer profiles."
    verification: "Review registration flow configurations in the CIAM platform to confirm minimal required fields at sign-up; validate that additional profile data is collected through subsequent interactions."
    appliesTo:
      platforms:
        - "Web"
        - "iOS"
        - "Android"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
      exceptionsProcess: "Legacy applications that cannot integrate with the CIAM platform must submit an exception request with a migration timeline not exceeding 12 months."
  - id: "REQ-006"
    statement: "Session tokens MUST be invalidated server-side on logout and password change."
    severity: "MUST"
    rationale: "Server-side session invalidation ensures that logout and password change actions immediately terminate all active sessions, preventing continued access with previously issued tokens in case of account compromise."
    verification: "Test logout and password change flows to confirm that previously issued session tokens and refresh tokens are immediately rejected by the CIAM platform after these events."
    appliesTo:
      platforms:
        - "Web"
        - "iOS"
        - "Android"
      tiers:
        - "Tier 1"
        - "Tier 2"
        - "Tier 3"
        - "Tier 4"
      exceptionsProcess: "Legacy applications that cannot integrate with the CIAM platform must submit an exception request with a migration timeline not exceeding 12 months."

guidelines:
  - id: "GUIDE-001"
    text: "Passwordless Adoption: Prioritize WebAuthn/FIDO2-based passwordless authentication for new customer-facing applications. Offer passkey enrollment during login and registration flows. Maintain password-based authentication as a fallback but encourage migration through UX nudges and reduced friction in passwordless flows."
  - id: "GUIDE-002"
    text: "Social Login Integration: Support social identity providers (Google, Apple, Facebook) as federated authentication options to reduce registration friction. Map social identities to internal customer profiles using account linking. Ensure that social login users are prompted to add a recovery method to prevent account lockout if the social provider is unavailable."
  - id: "GUIDE-003"
    text: "Consent Management: Implement granular consent collection that complies with GDPR, CCPA, and other applicable privacy regulations. Store consent records with timestamps and version references in the CIAM platform. Provide customers with a self-service consent management portal to review, modify, and withdraw consents at any time."

solutions:
  - id: "SOL-001"
    name: "Auth0/Okta Customer Identity Cloud"
    description: "Enterprise CIAM platform providing universal login, adaptive MFA, passwordless authentication, social connections, progressive profiling, and extensible authentication pipelines with Actions and Rules."
    link: "https://auth0.com"
  - id: "SOL-002"
    name: "AWS Cognito"
    description: "AWS-native customer identity service offering user pools with built-in sign-up/sign-in, federated identity support, OAuth 2.0/OIDC compliance, adaptive authentication, and integration with AWS services."
    link: "https://aws.amazon.com/cognito/"
  - id: "SOL-003"
    name: "Azure AD B2C"
    description: "Microsoft cloud identity service for customer-facing applications providing customizable authentication flows, social and enterprise identity federation, MFA, conditional access, and integration with Azure ecosystem."
    link: "https://azure.microsoft.com/en-us/services/active-directory/external-identities/b2c/"

