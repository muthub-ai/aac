# =============================================================================
# Architecture as Code (AaC) — CI/CD Pipeline
# =============================================================================
# This workflow automates the full enterprise architecture lifecycle with
# parallel domain-specific stages:
#
#   1. Lint & Test     — project-wide quality gate (ESLint + Vitest)
#   2. App Architecture — schema validation, compliance, diagrams, docs  (parallel)
#   3. Patterns         — pattern catalog page generation               (parallel)
#   4. Standards        — schema validation, standards catalog pages    (parallel)
#   5. Assemble         — merge all artifacts into a unified microsite
#   6. PR Feedback      — post diagram previews to pull request comments
#   7. Publish          — deploy microsite to GitHub Pages on merge to main
#
# CRITICAL: This pipeline does NOT use Structurizr CLI/DSL anywhere.
# All parsing, validation, and export is handled by our custom Node.js tooling.
# =============================================================================

name: AaC Pipeline

# ---------------------------------------------------------------------------
# Triggers: PR against main (for validation + feedback) and push to main
# (for validation + publish to GitHub Pages).
# ---------------------------------------------------------------------------
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# ---------------------------------------------------------------------------
# Concurrency: Cancel in-progress runs for the same PR to save compute.
# Push-to-main runs are never cancelled (we always want a full publish).
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ---------------------------------------------------------------------------
# Permissions required by downstream actions:
#   contents: write  — push to gh-pages branch (peaceiris/actions-gh-pages)
#   pull-requests: write — post PR comments (actions/github-script)
#   pages: write     — GitHub Pages deployment (if using native pages action)
#   id-token: write  — OIDC token for Pages deployment
# ---------------------------------------------------------------------------
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  # =========================================================================
  # STAGE 1 — Lint & Test (Quality Gate)
  # =========================================================================
  # Project-wide quality gate that must pass before any domain-specific
  # stages can run. Ensures code quality and test coverage.
  # =========================================================================
  lint-and-test:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    steps:
      # --- Setup -----------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      # --- Sub-stage: Lint -------------------------------------------------
      - name: "ESLint — code quality & Next.js best practices"
        run: npm run lint

      # --- Sub-stage: Unit Tests -------------------------------------------
      - name: "Vitest — run full test suite (288 tests)"
        run: npm run test:run

  # =========================================================================
  # STAGE 2a — Application Architecture
  # =========================================================================
  # Validates architecture model YAML files, enforces enterprise compliance
  # policies, generates diagrams, and builds the documentation microsite.
  # Runs in PARALLEL with Patterns and Standards stages.
  # =========================================================================
  app-architecture:
    name: "App Architecture"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      # --- Setup -----------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      # --- Sub-stage: Schema Validation ------------------------------------
      # Validates all model YAML files against the enterprise JSON Schema
      # + Zod schemas + cross-reference checks.
      # Fails fast if any model file is structurally invalid.
      # -------------------------------------------------------------------
      - name: "Schema validation — models (JSON Schema + Zod)"
        run: npx tsx scripts/validate-models.ts

      # --- Sub-stage: Architecture Compliance ------------------------------
      # Enforces enterprise architecture policies: no frontend-to-database
      # bypass, valid deployment references, technology standards compliance.
      # Blocks the PR if any policy is violated.
      # -------------------------------------------------------------------
      - name: "Architecture compliance — enterprise policy enforcement"
        run: npx tsx scripts/lint-architecture.ts

      # --- Sub-stage: Diagram Generation -----------------------------------
      # Transpiles YAML models into PlantUML (.puml) and Draw.io XML
      # (.drawio.xml) diagram files for all systems and views.
      # -------------------------------------------------------------------
      - name: "Diagram generation — PlantUML + Draw.io"
        run: npx tsx scripts/build-diagrams.ts

      # --- Sub-stage: Documentation Rendering ------------------------------
      # Converts AsciiDoc sources into a static HTML microsite using
      # Asciidoctor.js (pure Node.js, no Java).
      # Output: build/microsite/output/
      # -------------------------------------------------------------------
      - name: "Documentation rendering — Asciidoctor.js microsite"
        run: npx tsx scripts/build-docs.ts

      # --- Artifacts -------------------------------------------------------
      - name: "Upload documentation artifact"
        uses: actions/upload-artifact@v4
        with:
          name: app-docs
          path: build/microsite/output/
          retention-days: 7

      - name: "Upload diagram artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: src/docs/diagrams/
          retention-days: 7

  # =========================================================================
  # STAGE 2b — Patterns
  # =========================================================================
  # Generates the architecture pattern catalog with full documentation,
  # C4 diagrams, NFRs, constraints, and cost profiles.
  # Runs in PARALLEL with App Architecture and Standards stages.
  # =========================================================================
  patterns:
    name: "Patterns"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      # --- Setup -----------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      # --- Sub-stage: Pattern Catalog Generation ---------------------------
      # Generates static HTML pages for each architecture pattern with
      # architecture overview, C4 diagrams, NFRs, constraints, cost profile.
      # Output: build/patterns/
      # -------------------------------------------------------------------
      - name: "Pattern catalog — generate static pages"
        run: npx tsx scripts/build-pattern-pages.ts

      # --- Artifacts -------------------------------------------------------
      - name: "Upload pattern pages artifact"
        uses: actions/upload-artifact@v4
        with:
          name: pattern-pages
          path: build/patterns/
          retention-days: 7

  # =========================================================================
  # STAGE 2c — Standards
  # =========================================================================
  # Validates architecture standards against JSON Schema (draft 2020-12)
  # and generates the standards catalog pages.
  # Runs in PARALLEL with App Architecture and Patterns stages.
  # =========================================================================
  standards:
    name: "Standards"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      # --- Setup -----------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      # --- Sub-stage: Schema Validation ------------------------------------
      # Validates all standards YAML files against the architecture-standard
      # JSON Schema (draft 2020-12).
      # -------------------------------------------------------------------
      - name: "Schema validation — standards (JSON Schema 2020-12)"
        run: npx tsx scripts/validate-standards.ts

      # --- Sub-stage: Standards Catalog Generation -------------------------
      # Generates static HTML pages for each architecture standard with
      # requirements, guidelines, solutions, authoritative sources, etc.
      # Output: build/standards/
      # -------------------------------------------------------------------
      - name: "Standards catalog — generate static pages"
        run: npx tsx scripts/build-standard-pages.ts

      # --- Artifacts -------------------------------------------------------
      - name: "Upload standards pages artifact"
        uses: actions/upload-artifact@v4
        with:
          name: standards-pages
          path: build/standards/
          retention-days: 7

  # =========================================================================
  # STAGE 3 — Assemble Microsite
  # =========================================================================
  # Merges documentation, pattern catalog, and standards catalog into a
  # unified microsite for deployment. Waits for all three parallel stages.
  # =========================================================================
  assemble:
    name: "Assemble Microsite"
    runs-on: ubuntu-latest
    needs: [app-architecture, patterns, standards]
    steps:
      # --- Sub-stage: Download Artifacts -----------------------------------
      - name: "Download documentation artifact"
        uses: actions/download-artifact@v4
        with:
          name: app-docs
          path: site/

      - name: "Download pattern pages artifact"
        uses: actions/download-artifact@v4
        with:
          name: pattern-pages
          path: patterns/

      - name: "Download standards pages artifact"
        uses: actions/download-artifact@v4
        with:
          name: standards-pages
          path: standards/

      # --- Sub-stage: Merge ------------------------------------------------
      - name: "Merge all catalogs into microsite"
        run: |
          mkdir -p site/patterns site/standards
          cp -r patterns/* site/patterns/
          cp -r standards/* site/standards/
          echo "Assembled microsite contents:"
          find site -type f | head -50

      # --- Artifacts -------------------------------------------------------
      - name: "Upload assembled microsite"
        uses: actions/upload-artifact@v4
        with:
          name: microsite
          path: site/
          retention-days: 7

  # =========================================================================
  # STAGE 4 — PR Feedback Loop
  # =========================================================================
  # Only runs on pull_request events. Posts generated PlantUML diagrams
  # directly into the PR conversation so reviewers can see architecture
  # changes without downloading artifacts.
  # =========================================================================
  pr-feedback:
    name: "PR Diagram Preview"
    runs-on: ubuntu-latest
    needs: assemble
    if: github.event_name == 'pull_request'
    steps:
      - name: "Download diagram artifacts"
        uses: actions/download-artifact@v4
        with:
          name: diagrams
          path: diagrams/

      # ---------------------------------------------------------------------
      # Post PlantUML diagram code blocks to the PR discussion.
      # Collects all .puml files and formats them as collapsible sections.
      # Updates the same comment on re-runs (idempotent via comment marker).
      # ---------------------------------------------------------------------
      - name: "Post diagram previews to PR"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Recursively find all .puml files
            function findPuml(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) results.push(...findPuml(full));
                else if (entry.name.endsWith('.puml')) results.push(full);
              }
              return results;
            }

            const pumlFiles = findPuml('diagrams');
            if (pumlFiles.length === 0) {
              console.log('No .puml files found — skipping PR comment.');
              return;
            }

            // Build the comment body with collapsible sections per system
            const marker = '<!-- aac-diagram-preview -->';
            let body = `${marker}\n## Architecture Diagram Preview\n\n`;
            body += `> Auto-generated from model YAML files. `;
            body += `${pumlFiles.length} diagram(s) produced.\n\n`;

            // Group by system (first directory level)
            const grouped = {};
            for (const f of pumlFiles) {
              const rel = path.relative('diagrams', f);
              const system = rel.split(path.sep)[0] || 'unknown';
              if (!grouped[system]) grouped[system] = [];
              grouped[system].push({ rel, content: fs.readFileSync(f, 'utf8') });
            }

            for (const [system, files] of Object.entries(grouped)) {
              body += `<details>\n<summary><strong>${system}</strong> (${files.length} diagrams)</summary>\n\n`;
              for (const { rel, content } of files) {
                // Truncate very large diagrams to keep the comment readable
                const truncated = content.length > 4000
                  ? content.substring(0, 4000) + '\n... (truncated — see full artifact)'
                  : content;
                body += `#### \`${rel}\`\n\n\`\`\`plantuml\n${truncated}\n\`\`\`\n\n`;
              }
              body += `</details>\n\n`;
            }

            // Find existing comment to update (idempotent)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new PR comment with diagram previews');
            }

  # =========================================================================
  # STAGE 5 — Publish to GitHub Pages
  # =========================================================================
  # Only runs on push to main (i.e., after a PR is merged).
  # Deploys the assembled microsite to the gh-pages branch.
  # =========================================================================
  publish:
    name: "Publish to GitHub Pages"
    runs-on: ubuntu-latest
    needs: assemble
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Download assembled microsite"
        uses: actions/download-artifact@v4
        with:
          name: microsite
          path: site/

      # ---------------------------------------------------------------------
      # Deploy the static site to the gh-pages branch using the well-known
      # peaceiris/actions-gh-pages action. This handles force-pushing the
      # output directory, preserving CNAME, and setting the correct committer.
      # ---------------------------------------------------------------------
      - name: "Deploy to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Keep a single commit on gh-pages (no history bloat)
          force_orphan: true
          commit_message: "docs: publish architecture site from ${{ github.sha }}"
